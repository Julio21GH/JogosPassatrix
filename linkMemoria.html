	function construirArrayAleatoria(itemSorteado_num){
		if(indexSorteio_num < totalPossibilidadesMostradas_num + 1 && arrayAuxiliar_arr[itemSorteado_num] == 1){
			arrayAuxiliar_arr[itemSorteado_num] = '';
			arrayResultante_arr[indexSorteio_num] = itemSorteado_num;
			indexSorteio_num++;
			construirArrayAleatoria(getRandomInt(1, maximoPossibilidadesBanco_num+1));

		} else if(indexSorteio_num<totalPossibilidadesMostradas_num + 1 && arrayAuxiliar_arr[itemSorteado_num] == ''){
			construirArrayAleatoria(getRandomInt(1, maximoPossibilidadesBanco_num+1));
		}

	}

	function getRandomInt(min, max) {
		min = Math.ceil(min);
		max = Math.floor(max);
		return Math.floor(Math.random() * (max - min)) + min;
	}


function init(){

	for(j=1; j<maximoPossibilidadesBanco_num + 1; j++){
		arrayAuxiliar_arr[j] = 1;
	}

	construirArrayAleatoria(getRandomInt(1, maximoPossibilidadesBanco_num+1));

	for(i=1;i<17;i++){
		clicarBotoes(i);
		posicaoX(i);
	}
	

}

function posicaoX(i){
	respostaSorteada_arr[i] = resposta_arr[arrayResultante_arr[i]];
	figuraSorteada_arr[i] = figuras_arr[arrayResultante_arr[i]];
	document.getElementById("img"+i).src = figuraSorteada_arr[i];
}

function clicarBotoes(i){
	document.getElementById("bt"+i).onclick = function(){	
		clearInterval(tempoEfeito_num); //corrigir bug	
		if(id_arr[1] == 0 && id_arr[2] == 0){
			id_arr[1] = i;
			clicadas_arr[1] = respostaSorteada_arr[i];
			iniciarEfeitoFlip(i);
		}else if(id_arr[1] != 0 && id_arr[2] == 0){
			id_arr[2] = i;
			clicadas_arr[2] = respostaSorteada_arr[i];
			iniciarEfeitoFlip(i);
			tempoChecarPares_num = setInterval(checarPares,2000);			
		}
	}
}

function checarPares(){
	if(clicadas_arr[1] == clicadas_arr[2]){


	} else if(clicadas_arr[1] != clicadas_arr[2]){

		document.getElementById("img"+id_arr[1]).style.transform = "scale(0,1)";

		document.getElementById("bt"+id_arr[2]).style.transform = "scale(1,1)";
		document.getElementById("img"+id_arr[2]).style.transform = "scale(0,1)";

	}

	id_arr = [0,0,0];

}


function iniciarEfeitoFlip(bt_num){
	frame_num = 1;
	botao_num = bt_num;
	escalaBt_num = 1;
	escalaFig_num = 0;
	tempoEfeito_num = setInterval(efeitoFlip,50);
}

function efeitoFlip(){
	if(frame_num < 10){	
		frame_num = frame_num + 1;			
	} else {
		frame_num = 1;
		clearInterval(tempoEfeito_num);
	}

	switch(frame_num){
		case 2: escalaBt_num = escalaBt_num - 0.1;
		break;

		case 3: escalaBt_num = escalaBt_num - 0.1;
		break;

		case 4: escalaBt_num = escalaBt_num - 0.1;
		break;

		case 5: escalaBt_num = 0.1;
			escalaFig_num = 0.1;
		break;

		case 6: escalaBt_num = 0;
			escalaFig_num = escalaFig_num + 0.1;
		break;

		case 7: escalaFig_num = escalaFig_num + 0.1;
		break;

		case 8: escalaFig_num = escalaFig_num + 0.1;
		break;

		case 9: escalaFig_num = 1;
			clearInterval(tempoEfeito_num);
		break;
	}

	document.getElementById("bt"+botao_num).style.transform = "scale(" + escalaBt_num +",1)";
	document.getElementById("img"+botao_num).style.transform = "scale(" + escalaFig_num+",1)";
}

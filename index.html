<script>
var contador_num = 0;
var slider_num = 1;

function slider(){
	document.getElementById("slider"+slider_num).style.display = "block";
	document.getElementById("marcador"+slider_num).style.backgroundColor = "#FF6600";
	if(contador_num < 5){
		contador_num++;
	} else if(contador_num == 5){
		contador_num = 0;
		document.getElementById("slider"+slider_num).style.display = "none";
		document.getElementById("marcador"+slider_num).style.backgroundColor = "green";
		if(slider_num == 4){
			slider_num = 0;
		}
		slider_num++; 
	}
}

setInterval(slider, 1000);

function redirecionar(){
	link_str = document.getElementById("cxAcao").value;
	window.location.assign(link_str);
}
</script>

<body style="overflow-x: hidden; overflow-y: scroll;">
